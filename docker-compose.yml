services:
  db:
    image: postgres:16
    environment:
      POSTGRES_USER: langai
      POSTGRES_PASSWORD: langai
      POSTGRES_DB: langai
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data

  ollama:
    image: ollama/ollama:latest
    ports:
      - "11434:11434"
    volumes:
      - ollama_data:/root/.ollama

  backend:
    build:
      context: ./backend
    environment:
      APP_NAME: LangAI Family
      DEBUG: "false"
      DATABASE_URL: postgresql+psycopg2://langai:langai@db:5432/langai
      JWT_SECRET: change-this-secret
      JWT_ALGORITHM: HS256
      ACCESS_TOKEN_EXPIRE_MINUTES: 1440
      OLLAMA_URL: ${OLLAMA_URL:-http://ollama:11434}
      OLLAMA_MODEL: llama3.2:3b
      WHISPER_MODEL_SIZE: medium
      FRONTEND_ORIGIN: http://localhost:5173
    depends_on:
      - db
    extra_hosts:
      - "host.docker.internal:host-gateway"
    ports:
      - "8000:8000"

  frontend:
    build:
      context: ./frontend
    depends_on:
      - backend
    ports:
      - "5173:5173"
    environment:
      NODE_ENV: development

volumes:
  postgres_data:
  ollama_data:
